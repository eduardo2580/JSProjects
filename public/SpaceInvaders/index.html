<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <title>Space Invaders</title>
        <link rel="stylesheet" href="space.css">
        <script src="space.js" defer></script>
    </head>

    <body>
        <div class="app-shell">
            <header class="header-shell">
                <div>
                    <h1>Space Invaders</h1>
                </div>
                <div class="status-bar">
                    <div class="status-block">
                        <span>Score</span>
                        <strong id="scoreValue">0</strong>
                    </div>
                    <div class="status-block">
                        <span>Level</span>
                        <strong id="levelValue">1</strong>
                    </div>
                    <div class="status-block">
                        <span>Best</span>
                        <strong id="bestValue">0</strong>
                    </div>
                    <div class="status-block">
                        <span>Controls</span>
                        <strong>◀ ▶ ● / Space</strong>
                    </div>
                </div>
            </header>

            <main class="board-shell">
                <div class="board-wrapper">
                    <canvas id="board" aria-label="Space Invaders game board"></canvas>
                    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
                        <div class="overlay-panel">
                            <h2 id="overlay-title">Space Invaders</h2>
                            <p id="overlay-message">Tap Start or press Space to defend the galaxy.</p>
                            <div class="overlay-buttons">
                                <button id="startBtn" class="button button-primary">Start</button>
                                <button id="restartBtn" class="button button-secondary hidden">Restart</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <div class="controls" role="group" aria-label="Game controls">
                <button id="leftBtn" class="control">◀</button>
                <button id="shootBtn" class="control shoot">●</button>
                <button id="rightBtn" class="control">▶</button>
            </div>

            <footer class="footer-note">Designed for desktop and touch devices. Tap a control to wake sounds.</footer>
        </div>
    </body>
</html>
